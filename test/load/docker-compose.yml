services:
  postgres:
    image: postgres:13-alpine
    container_name: test-postgres
    environment:
      POSTGRES_DB: dns_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d dns_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  app:
    build:
      context: ../../
      dockerfile: test/load/Dockerfile
    container_name: test-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ROLE: master
      BIND_ZONE_DIR: /var/named/
      BIND_NAMED_CONF: /etc/named.conf
      BIND_ZONE_CONF: /etc/named.zones.conf
      BIND_API_DB_HOST: postgres
      BIND_API_DB_PORT: 5432
      BIND_API_DB_USER: test_user
      BIND_API_DB_PASSWORD: test_password
      BIND_API_DB_NAME: dns_test
      BIND_API_DB_SSLMODE: disable
      BIND_API_DB_SCHEMA: public
      API_PORT: :8080
      GIN_MODE: release
      SYNC_API_TOKEN: test_sync_token_12345
      MAX_QUEUE_SIZE: 1000
      WORKER_TIMEOUT: 60
      BATCH_SIZE: 500
      BATCH_INTERVAL: 1
      QUEUE_THRESHOLD_LOW: 0.08
      QUEUE_THRESHOLD_HIGH: 0.1
      RELOAD_INTERVAL: 5
    ports:
      - "8080:8080"
      - "53:53"
      - "53:53/udp"
    volumes:
      - ../../:/app/src
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./results:/app/results
    networks:
      - test-network
    command: >
      sh -c "
        named -g -u named &
        sleep 5 &&
        cd /app/src &&
        go mod download &&
        go build -o /app/bind-api main.go &&
        /app/bind-api
      "

networks:
  test-network:
    driver: bridge