on:
  push:
    - workflows: [release-workflow]
      filter:
        tags: ["**"]

env:
  BINARY_NAME: bind-api

workflows:
  release-workflow:
    tasks:
      - name: build-and-release
        cubes:
          - name: build-binary
            image: docker.io/library/golang:1.26
            script:
              - GOOS=linux GOARCH=amd64 go build -o ${BINARY_NAME}-amd64 main.go
              - tar -czf ${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}-amd64.tar.gz ${BINARY_NAME}-amd64
              - GOOS=linux GOARCH=arm64 go build -o ${BINARY_NAME}-arm64 main.go
              - tar -czf ${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}-arm64.tar.gz ${BINARY_NAME}-arm64
            artifacts:
              paths:
                - "${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}-amd64.tar.gz"
                - "${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}-arm64.tar.gz"

          - name: create-release
            image: docker.io/library/alpine:latest
            script:
              - |
                apk add --no-cache curl jq
                PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
                if [ -n "$PREV_TAG" ]; then
                  CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
                else
                  CHANGELOG=$(git log --pretty=format:"- %s (%h)")
                fi
                curl -X POST \
                  -H "Authorization: Bearer $SOURCECRAFT_TOKEN" \
                  -H "Content-Type: application/json" \
                  "https://api.sourcecraft.tech/api/v1/repos/$SOURCECRAFT_REPO_ID/releases" \
                  -d "{
                    \"tag_name\": \"$SOURCECRAFT_COMMIT_REF_NAME\",
                    \"name\": \"Release $SOURCECRAFT_COMMIT_REF_NAME\",
                    \"body\": \"$CHANGELOG\"
                  }"
                for asset in ${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}*.tar.gz; do
                  curl -X POST \
                    -H "Authorization: Bearer $SOURCECRAFT_TOKEN" \
                    -F "file=@${asset}" \
                    "https://api.sourcecraft.tech/api/v1/repos/$SOURCECRAFT_REPO_ID/releases/$SOURCECRAFT_COMMIT_REF_NAME/assets"
                done