version: 1
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -o bind-api-amd64 main.go
          tar -czf bind-api-${{ github.ref_name }}-amd64.tar.gz bind-api-amd64

      - name: Build for arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -o bind-api-arm64 main.go
          tar -czf bind-api-${{ github.ref_name }}-arm64.tar.gz bind-api-arm64

      - name: Generate release notes
        id: generate-notes
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        id: create-release
        uses: actions/create-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: ${{ steps.generate-notes.outputs.CHANGELOG }}
          draft: false
          prerelease: false

      - name: Upload amd64 archive to release
        uses: actions/upload-release-asset@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: bind-api-${{ github.ref_name }}-amd64.tar.gz
          asset_name: bind-api-${{ github.ref_name }}-amd64.tar.gz
          asset_content_type: application/gzip

      - name: Upload arm64 archive to release
        uses: actions/upload-release-asset@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: bind-api-${{ github.ref_name }}-arm64.tar.gz
          asset_name: bind-api-${{ github.ref_name }}-arm64.tar.gz
          asset_content_type: application/gzip
