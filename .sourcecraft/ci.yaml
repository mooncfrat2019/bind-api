# Исправленная версия CI/CD - добавлены тесты и исправлены зависимости
on:
  pull_request:
    - workflows: [test-workflow]
      filter:
        source_branches: ["**"]
        target_branches: ["main"]

  push:
    - workflows: [test-workflow]
      filter:
        branches: ["main", "develop"]
    - workflows: [release-workflow]
      filter:
        tags: ["**"]

env:
  BINARY_NAME: bind-api
  TOKEN: ${{ secrets.REPO_TOKEN }}

workflows:
  test-workflow:
    tasks:
      - name: run-tests
        cubes:
          - name: setup-and-test
            image: docker.io/library/golang:1.26
            script:
              - |
                set -e
                echo "Синхронизация зависимостей Go..."
                go mod tidy
                echo "Загрузка зависимостей..."
                go mod download
                echo "Проверка целостности зависимостей..."
                go mod verify
                echo "Запуск тестов..."
                go test ./...
                echo "Тесты успешно пройдены"

  release-workflow:
    tasks:
      - name: build-and-release
        cubes:
          - name: build-binary
            image: docker.io/library/golang:1.26
            script:
              - |
                set -e
                echo "Очистка и синхронизация зависимостей Go..."
                go mod tidy
                echo "Загрузка зависимостей..."
                go mod download
                echo "Проверка целостности зависимостей..."
                go mod verify
                echo "Сборка бинарников для amd64 и arm64..."
                GOOS=linux GOARCH=amd64 go build -o ${BINARY_NAME}-amd64 main.go
                tar -czf ${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}-amd64.tar.gz ${BINARY_NAME}-amd64
                GOOS=linux GOARCH=arm64 go build -o ${BINARY_NAME}-arm64 main.go
                tar -czf ${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}-arm64.tar.gz ${BINARY_NAME}-arm64
                echo "Бинарники успешно собраны"
                ls -la *.tar.gz
            artifacts:
              paths:
                - "*.tar.gz"
          
          - name: create-release
            image: docker.io/library/alpine:latest
            script:
              - |
                set -e
                echo "Создание релиза ${SOURCECRAFT_COMMIT_REF_NAME}..."
                apk add --no-cache git curl jq
                
                # Проверяем наличие git
                git --version
                
                # Используем реальные имена файлов с тегами
                AMD64_FILE="${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}-amd64.tar.gz"
                ARM64_FILE="${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}-arm64.tar.gz"
                
                # Проверяем наличие собранных файлов
                if [ ! -f "$AMD64_FILE" ]; then
                  echo "Ошибка: файл \"$AMD64_FILE\" не найден"
                  exit 1
                fi
                
                if [ ! -f "$ARM64_FILE" ]; then
                  echo "Ошибка: файл \"$ARM64_FILE\" не найден"
                  exit 1
                fi
                
                # Извлекаем orgSlug и repoSlug из SOURCECRAFT_REPO_URL
                # Формат: https://git@git.sourcecraft.dev/<orgSlug>/<repoSlug>.git
                REPO_URL="$SOURCECRAFT_REPO_URL"
                # Удаляем префикс и суффикс
                TEMP="${REPO_URL#https://git@git.sourcecraft.dev/}"
                TEMP="${TEMP%.git}"
                ORG_SLUG="${TEMP%/*}"
                REPO_SLUG="${TEMP#*/}"
                
                if [ -z "$ORG_SLUG" ] || [ -z "$REPO_SLUG" ]; then
                  echo "Ошибка: не удалось извлечь slugs из SOURCECRAFT_REPO_URL: $REPO_URL"
                  echo "Получено: ORG_SLUG=$ORG_SLUG, REPO_SLUG=$REPO_SLUG"
                  exit 1
                fi
                
                echo "Извлечено: ORG_SLUG=$ORG_SLUG, REPO_SLUG=$REPO_SLUG"
                
                # Формируем changelog
                PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
                if [ -n "$PREV_TAG" ]; then
                  CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
                else
                  CHANGELOG=$(git log --pretty=format:"- %s (%h)")
                fi
                
                # Экранируем JSON
                ESCAPED_CHANGELOG=$(echo "$CHANGELOG" | jq -R -s -c '.')
                
                # Создаем релиз через API (согласно документации)
                echo "Создание релиза в SourceCraft..."
                echo "Endpoint: https://api.sourcecraft.tech/repos/$ORG_SLUG/$REPO_SLUG/releases"
                
                # Создаем JSON файл для запроса
                cat > /tmp/release.json << EOF
                {
                  "tag": "$SOURCECRAFT_COMMIT_REF_NAME",
                  "body": $ESCAPED_CHANGELOG,
                  "title": "Release $SOURCECRAFT_COMMIT_REF_NAME",
                  "publish": true
                }
                EOF
                
                # Отправляем запрос на создание релиза
                RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -H "Accept: application/json" \
                  "https://api.sourcecraft.tech/repos/$ORG_SLUG/$REPO_SLUG/releases" \
                  -d @/tmp/release.json)
                
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
                
                echo "HTTP код ответа: $HTTP_CODE"
                echo "Тело ответа: $RESPONSE_BODY"
                
                if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
                  echo "Ошибка: не удалось создать релиз"
                  exit 1
                fi
                
                # Прикрепляем артефакты с правильными именами
                echo "Прикрепление артефактов..."
                for asset in ${BINARY_NAME}-${SOURCECRAFT_COMMIT_REF_NAME}*.tar.gz; do
                  echo "Загрузка $asset..."
                  UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                    -H "Authorization: Bearer $TOKEN" \
                    -F "file=@${asset}" \
                    "https://api.sourcecraft.tech/repos/$ORG_SLUG/$REPO_SLUG/releases/$SOURCECRAFT_COMMIT_REF_NAME/assets")
                  
                  UPLOAD_HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
                  UPLOAD_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
                  
                  echo "HTTP код загрузки: $UPLOAD_HTTP_CODE"
                  if [ "$UPLOAD_HTTP_CODE" != "201" ] && [ "$UPLOAD_HTTP_CODE" != "200" ]; then
                    echo "Ошибка загрузки артефакта: $UPLOAD_BODY"
                    exit 1
                  fi
                done
                
                echo "Релиз успешно создан и артефакты загружены!"