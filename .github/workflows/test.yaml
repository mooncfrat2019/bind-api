name: Run Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск

jobs:
  test-internal:
    name: Test Internal Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev
          go mod download

      - name: Run internal tests sequentially
        run: |
          go test ./internal/... -v -p 1 -timeout 5m
        env:
          CGO_ENABLED: 1

      - name: Run internal tests with coverage
        run: |
          go test ./internal/... -coverprofile=internal-coverage.out -p 1
        env:
          CGO_ENABLED: 1

  test-bench:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev
          go mod download

      - name: Run benchmarks
        run: |
          go test ./... -bench=. -benchmem -benchtime=1s -run=^$ -timeout 10m
        env:
          CGO_ENABLED: 1

      - name: Save benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.txt
          retention-days: 30