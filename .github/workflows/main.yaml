name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Tidy dependencies (optional but recommended)
        run: go mod tidy

      - name: Verify dependencies
        run: go mod verify

      - name: Build for ${{ matrix.arch }}
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -o bind-api-linux-${{ matrix.arch }} main.go

      - name: Create tar.gz for ${{ matrix.arch }}
        run: |
          tar -czf bind-api-linux-${{ matrix.arch }}.tar.gz bind-api-linux-${{ matrix.arch }}

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Получаем предыдущий тег
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF_NAME}
          
          # Формируем заголовок
          cat > release_notes.md << EOF
          ## Release ${CURRENT_TAG}
          
          ### Downloads
          - \`bind-api-linux-amd64.tar.gz\` - AMD64 architecture
          - \`bind-api-linux-arm64.tar.gz\` - ARM64 architecture
          
          ### Changelog
          
          EOF
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # Первый релиз - показываем все коммиты
            echo "### All commits:" >> release_notes.md
            git log --pretty=format:"- **%s** (%h) - %an, %ar" --reverse >> release_notes.md
          else
            # Коммиты между релизами
            echo "### Changes since ${PREVIOUS_TAG}:" >> release_notes.md
            echo "" >> release_notes.md
          
            # Группируем по типу изменений (опционально)
            echo "#### 🚀 New Features" >> release_notes.md
            git log ${PREVIOUS_TAG}..HEAD --grep="feat" --pretty=format:"- %s (%h)" --reverse >> release_notes.md || echo "None" >> release_notes.md
          
            echo "" >> release_notes.md
            echo "#### 🐛 Bug Fixes" >> release_notes.md
            git log ${PREVIOUS_TAG}..HEAD --grep="fix" --pretty=format:"- %s (%h)" --reverse >> release_notes.md || echo "None" >> release_notes.md
          
            echo "" >> release_notes.md
            echo "#### 📚 Documentation" >> release_notes.md
            git log ${PREVIOUS_TAG}..HEAD --grep="docs" --pretty=format:"- %s (%h)" --reverse >> release_notes.md || echo "None" >> release_notes.md
          
            echo "" >> release_notes.md
            echo "#### 🔧 Other Changes" >> release_notes.md
            git log ${PREVIOUS_TAG}..HEAD --invert-grep --grep="feat" --grep="fix" --grep="docs" --pretty=format:"- %s (%h)" --reverse >> release_notes.md || echo "None" >> release_notes.md
          fi
          
          # Добавляем информацию о сборке
          cat >> release_notes.md << EOF
          
          ---
          ### 🔨 Build Details
          - Go version: 1.23
          - Build date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - Commit: ${GITHUB_SHA::7}
          
          EOF

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bind-api-linux-*.tar.gz
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}